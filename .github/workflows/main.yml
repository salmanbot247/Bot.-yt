name: 24/7 Telegram JazzDrive Bot

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Engines & Tools
        # Yahan yt-dlp ka special master link lagaya hai
        run: |
          pip install python-telegram-bot playwright nest_asyncio requests
          python -m pip install --force-reinstall https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz
          playwright install chromium
          playwright install-deps chromium

      - name: Start The Bot
        timeout-minutes: 290
        run: python bot.py
